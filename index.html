<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Contador</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --bg2: #ece6d8;
    --bg3: #e0d9cc;
    --surface: #faf8f3;
    --border: #c8bfaa;
    --text: #1a1612;
    --text2: #5a5248;
    --text3: #8a7f72;
    --accent: #c0392b;
    --accent2: #e74c3c;
    --accent-light: #fdecea;
    --green: #27ae60;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
    --radius: 4px;
    --radius-lg: 8px;
  }
  [data-theme="dark"] {
    --bg: #0f0d0b;
    --bg2: #181410;
    --bg3: #221e18;
    --surface: #1c1814;
    --border: #3a322a;
    --text: #f0ebe0;
    --text2: #b0a898;
    --text3: #706860;
    --accent: #e05a4a;
    --accent2: #ff6b58;
    --accent-light: #2a1510;
    --green: #3dbe74;
    --shadow: 0 2px 12px rgba(0,0,0,0.4);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
  }

  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow);
  }
  .brand {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: -0.5px;
    color: var(--accent);
  }
  .brand span { color: var(--text); }
  .topbar-actions { display: flex; gap: 8px; align-items: center; }

  .btn-icon {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text2);
    width: 36px; height: 36px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    transition: all 0.15s;
  }
  .btn-icon:hover { background: var(--bg3); color: var(--text); }

  .layout {
    display: flex;
    min-height: calc(100vh - 56px);
  }

  .sidebar {
    width: 240px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .sidebar-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text3);
  }
  .accounts-list { flex: 1; overflow-y: auto; padding: 8px; }
  .account-item {
    padding: 10px 12px;
    border-radius: var(--radius);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2px;
    transition: background 0.15s;
    border: 1px solid transparent;
  }
  .account-item:hover { background: var(--bg2); }
  .account-item.active {
    background: var(--accent-light);
    border-color: var(--accent);
  }
  .account-item.active .account-name { color: var(--accent); font-weight: 500; }
  .account-name {
    font-size: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }
  .account-total {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    margin-left: 8px;
    flex-shrink: 0;
  }
  .delete-acct {
    background: none; border: none; cursor: pointer;
    color: var(--text3); font-size: 14px; padding: 2px 4px;
    border-radius: 3px; display: none; transition: color 0.15s;
  }
  .account-item:hover .delete-acct { display: block; }
  .delete-acct:hover { color: var(--accent); }

  .btn-new-account {
    margin: 12px;
    padding: 10px;
    background: var(--bg2);
    border: 1.5px dashed var(--border);
    border-radius: var(--radius);
    color: var(--text3);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .btn-new-account:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

  .main {
    flex: 1;
    padding: 32px;
    overflow-y: auto;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 60vh;
    gap: 16px;
    color: var(--text3);
    text-align: center;
  }
  .empty-state .big-icon { font-size: 64px; opacity: 0.3; }
  .empty-state h2 { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--text2); }
  .empty-state p { font-size: 14px; max-width: 300px; line-height: 1.6; }

  .acct-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }
  .acct-title-wrap { display: flex; align-items: center; gap: 10px; flex: 1; }
  .acct-title {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 900;
    letter-spacing: -1px;
    color: var(--text);
    cursor: pointer;
    padding: 2px 6px;
    border-radius: var(--radius);
    border: 1.5px solid transparent;
    transition: border-color 0.15s;
  }
  .acct-title:hover { border-color: var(--border); }
  .acct-title[contenteditable="true"] {
    outline: none;
    border-color: var(--accent);
    background: var(--accent-light);
  }
  .share-btn {
    padding: 8px 14px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 13px;
    color: var(--text2);
    cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .share-btn:hover { background: var(--bg3); color: var(--text); }
  .share-btn.copied { background: #eafaf1; border-color: var(--green); color: var(--green); }

  .counters-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
    margin-bottom: 40px;
  }

  .counter-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: box-shadow 0.2s;
  }
  .counter-card:hover { box-shadow: var(--shadow-lg); }

  .counter-label-wrap {
    padding: 14px 16px 8px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 6px;
  }
  .counter-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    flex: 1;
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 3px;
    border: 1px solid transparent;
    transition: border-color 0.15s;
  }
  .counter-label:hover { border-color: var(--border); }
  .counter-label[contenteditable="true"] { outline: none; border-color: var(--accent); background: var(--accent-light); }
  .delete-opt {
    background: none; border: none; cursor: pointer;
    color: var(--text3); font-size: 13px; padding: 2px 4px;
    border-radius: 3px; transition: color 0.15s; opacity: 0;
    pointer-events: none;
  }
  .counter-card:hover .delete-opt { opacity: 1; pointer-events: all; }
  .delete-opt:hover { color: var(--accent); }

  .counter-body {
    padding: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .counter-number {
    font-family: 'DM Mono', monospace;
    font-size: 52px;
    font-weight: 500;
    line-height: 1;
    color: var(--text);
    cursor: pointer;
    padding: 4px 8px;
    border-radius: var(--radius);
    border: 1.5px solid transparent;
    transition: all 0.15s;
    min-width: 80px;
    text-align: center;
  }
  .counter-number:hover { border-color: var(--border); }
  .counter-number[contenteditable="true"] {
    outline: none;
    border-color: var(--accent);
    background: var(--accent-light);
    color: var(--accent);
  }

  .counter-pct {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text3);
    letter-spacing: 0.5px;
  }

  .counter-bar-wrap {
    width: 100%;
    height: 4px;
    background: var(--bg3);
    border-radius: 2px;
    overflow: hidden;
  }
  .counter-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  }

  .btn-tap {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 22px;
    font-weight: 300;
    cursor: pointer;
    transition: background 0.1s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }
  .btn-tap:hover { background: var(--accent2); }
  .btn-tap:active { transform: scale(0.97); }

  @keyframes ripple {
    from { transform: scale(0); opacity: 0.5; }
    to { transform: scale(4); opacity: 0; }
  }
  .ripple-el {
    position: absolute;
    width: 40px; height: 40px;
    border-radius: 50%;
    background: white;
    pointer-events: none;
    animation: ripple 0.4s ease-out forwards;
    transform-origin: center;
  }

  .btn-add-option {
    background: var(--surface);
    border: 1.5px dashed var(--border);
    border-radius: var(--radius-lg);
    padding: 32px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    color: var(--text3);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    transition: all 0.15s;
  }
  .btn-add-option:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .btn-add-option .plus { font-size: 28px; font-weight: 300; }

  .stats-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 24px;
    box-shadow: var(--shadow);
  }
  .stats-title {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .stats-total {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: var(--text);
  }
  .stats-total span {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    color: var(--accent);
  }
  .stat-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }
  .stat-name {
    font-size: 13px;
    color: var(--text2);
    width: 140px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex-shrink: 0;
  }
  .stat-bar-wrap {
    flex: 1;
    height: 6px;
    background: var(--bg3);
    border-radius: 3px;
    overflow: hidden;
  }
  .stat-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  }
  .stat-nums {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text3);
    text-align: right;
    width: 80px;
    flex-shrink: 0;
  }

  .btn-reset {
    margin-top: 20px;
    padding: 8px 16px;
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text3);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-reset:hover { border-color: var(--accent); color: var(--accent); }

  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(3px);
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 32px;
    width: 100%;
    max-width: 420px;
    box-shadow: var(--shadow-lg);
    transform: translateY(12px);
    transition: transform 0.2s;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal h2 {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    margin-bottom: 24px;
    color: var(--text);
  }
  .form-group { margin-bottom: 16px; }
  .form-label {
    display: block;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 6px;
  }
  .form-input {
    width: 100%;
    padding: 10px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    transition: border-color 0.15s;
  }
  .form-input:focus { outline: none; border-color: var(--accent); }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }
  .btn-primary {
    padding: 10px 22px;
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-primary:hover { background: var(--accent2); }
  .btn-secondary {
    padding: 10px 22px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text2);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-secondary:hover { background: var(--bg3); }

  .options-preview { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
  .option-row { display: flex; gap: 8px; align-items: center; }
  .option-row .form-input { flex: 1; }
  .btn-rm {
    background: none; border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text3); cursor: pointer; padding: 0 10px; height: 38px;
    transition: all 0.15s;
  }
  .btn-rm:hover { border-color: var(--accent); color: var(--accent); }
  .btn-add-row {
    padding: 8px;
    background: var(--bg2);
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    color: var(--text3);
    cursor: pointer;
    font-size: 13px;
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
    width: 100%;
    margin-top: 8px;
  }
  .btn-add-row:hover { border-color: var(--accent); color: var(--accent); }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--text); color: var(--bg);
    padding: 10px 20px; border-radius: 20px;
    font-size: 13px; font-family: 'DM Mono', monospace;
    z-index: 300;
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
  }
  .popping { animation: pop 0.15s ease-out; }

  @media (max-width: 600px) {
    .sidebar {
      width: 0; overflow: hidden; position: fixed;
      z-index: 50; height: 100vh; top: 56px;
      transition: width 0.2s;
    }
    .sidebar.open { width: 240px; box-shadow: var(--shadow-lg); }
    .main { padding: 20px 16px; }
    .counters-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
    .acct-title { font-size: 24px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">cont<span>a</span>dor</div>
  <div class="topbar-actions">
    <button class="btn-icon" id="theme-toggle" title="Cambiar tema">🌙</button>
    <button class="btn-icon" id="menu-toggle" title="Menú" style="display:none">☰</button>
  </div>
</div>

<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">Cuentas</div>
    <div class="accounts-list" id="accounts-list"></div>
    <button class="btn-new-account" id="btn-new-account">+ Nueva cuenta</button>
  </div>
  <div class="main" id="main-view">
    <div class="empty-state" id="empty-state">
      <div class="big-icon">◈</div>
      <h2>Sin cuentas aún</h2>
      <p>Crea tu primera cuenta para empezar a registrar datos.</p>
      <button class="btn-primary" id="btn-empty-create">Crear cuenta</button>
    </div>
    <div id="account-view" style="display:none"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2>Nueva cuenta</h2>
    <div class="form-group">
      <label class="form-label">Nombre de la cuenta</label>
      <input class="form-input" id="modal-acct-name" placeholder="ej: Encuesta sabores" maxlength="40"/>
    </div>
    <div class="form-group">
      <label class="form-label">Opciones a contar</label>
      <div class="options-preview" id="modal-options"></div>
      <button class="btn-add-row" id="btn-add-row">+ Añadir opción</button>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" id="btn-cancel-modal">Cancelar</button>
      <button class="btn-primary" id="btn-create-account">Crear</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── STATE ──
let state = { accounts: [], activeId: null, darkMode: false };
let modalOptionRows = [];

function save() { localStorage.setItem('contador_v2', JSON.stringify(state)); }

function load() {
  try { const r = localStorage.getItem('contador_v2'); if (r) state = JSON.parse(r); } catch(e) {}
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── SHARE / URL ──
function getShareUrl(account) {
  const data = btoa(encodeURIComponent(JSON.stringify(account)));
  return location.origin + location.pathname + '#share=' + data;
}

function loadFromHash() {
  const hash = location.hash;
  if (!hash.startsWith('#share=')) return;
  try {
    const data = JSON.parse(decodeURIComponent(atob(hash.slice(7))));
    data.id = uid();
    data.name = data.name + ' (importada)';
    state.accounts.push(data);
    state.activeId = data.id;
    save();
    history.replaceState(null,'',location.pathname);
    showToast('✓ Cuenta importada desde enlace');
  } catch(e) {}
}

// ── SIDEBAR ──
function renderSidebar() {
  const list = document.getElementById('accounts-list');
  list.innerHTML = '';
  state.accounts.forEach(acct => {
    const total = acct.options.reduce((s,o) => s+o.count, 0);
    const el = document.createElement('div');
    el.className = 'account-item' + (acct.id === state.activeId ? ' active' : '');
    el.innerHTML = `
      <span class="account-name">${escHtml(acct.name)}</span>
      <span class="account-total">${total}</span>
      <button class="delete-acct" title="Eliminar">✕</button>`;
    el.querySelector('.delete-acct').addEventListener('click', e => {
      e.stopPropagation();
      deleteAccount(acct.id);
    });
    el.addEventListener('click', () => selectAccount(acct.id));
    list.appendChild(el);
  });
}

function selectAccount(id) {
  state.activeId = id;
  save();
  renderSidebar();
  renderAccountView();
  document.getElementById('sidebar').classList.remove('open');
}

function deleteAccount(id) {
  if (!confirm('¿Eliminar esta cuenta y todos sus datos?')) return;
  state.accounts = state.accounts.filter(a => a.id !== id);
  if (state.activeId === id) state.activeId = state.accounts[0]?.id || null;
  save();
  renderSidebar();
  renderAccountView();
}

// ── ACCOUNT VIEW ──
function renderAccountView() {
  const empty = document.getElementById('empty-state');
  const view = document.getElementById('account-view');

  const acct = state.accounts.find(a => a.id === state.activeId);
  if (!acct) {
    empty.style.display = 'flex';
    view.style.display = 'none';
    return;
  }
  empty.style.display = 'none';
  view.style.display = 'block';

  const total = acct.options.reduce((s,o) => s+o.count, 0);

  const cards = acct.options.map(opt => {
    const pct = total > 0 ? Math.round(opt.count/total*100) : 0;
    return `
      <div class="counter-card" id="card-${opt.id}">
        <div class="counter-label-wrap">
          <span class="counter-label"
            data-acct="${acct.id}" data-opt="${opt.id}" data-role="label"
          >${escHtml(opt.name)}</span>
          <button class="delete-opt" data-acct="${acct.id}" data-opt="${opt.id}" data-role="del-opt">✕</button>
        </div>
        <div class="counter-body">
          <span class="counter-number" id="num-${opt.id}"
            data-acct="${acct.id}" data-opt="${opt.id}" data-role="number"
          >${opt.count}</span>
          <div class="counter-bar-wrap">
            <div class="counter-bar" id="bar-${opt.id}" style="width:${pct}%"></div>
          </div>
          <span class="counter-pct" id="pct-${opt.id}">${pct}%</span>
          <button class="btn-tap" data-acct="${acct.id}" data-opt="${opt.id}" data-role="tap">+</button>
        </div>
      </div>`;
  }).join('');

  const statsRows = acct.options.map(opt => {
    const pct = total > 0 ? Math.round(opt.count/total*100) : 0;
    return `
      <div class="stat-row">
        <span class="stat-name">${escHtml(opt.name)}</span>
        <div class="stat-bar-wrap"><div class="stat-bar" style="width:${pct}%"></div></div>
        <span class="stat-nums">${opt.count} · ${pct}%</span>
      </div>`;
  }).join('');

  view.innerHTML = `
    <div class="acct-header">
      <div class="acct-title-wrap">
        <span class="acct-title" data-acct="${acct.id}" data-role="title">${escHtml(acct.name)}</span>
      </div>
      <button class="share-btn" id="share-btn" data-acct="${acct.id}">⬡ Compartir</button>
    </div>
    <div class="counters-grid">${cards}
      <button class="btn-add-option" id="btn-add-opt-inline">
        <span class="plus">+</span><span>Añadir opción</span>
      </button>
    </div>
    <div class="stats-section" id="stats-section">
      <div class="stats-title">
        <span>Resumen</span>
        <span class="stats-total">Total: <span id="stats-total-num">${total}</span></span>
      </div>
      <div id="stats-rows">${statsRows || '<p style="color:var(--text3);font-size:13px">Sin opciones aún.</p>'}</div>
      <button class="btn-reset" id="btn-reset">Resetear contadores</button>
    </div>`;

  // events via delegation on view (remove first to avoid duplicates on re-render)
  view.removeEventListener('click', handleViewClick);
  view.addEventListener('click', handleViewClick);
}

function handleViewClick(e) {
  // buttons without data-role: share, add-option, reset
  const shareBtn = e.target.closest('#share-btn');
  if (shareBtn) { shareAccount(shareBtn.dataset.acct); return; }

  const addOpt = e.target.closest('#btn-add-opt-inline');
  if (addOpt) { addOptionInline(); return; }

  const reset = e.target.closest('#btn-reset');
  if (reset) { resetAccount(state.activeId); return; }

  // elements with data-role
  const el = e.target.closest('[data-role]');
  if (!el) return;
  const role = el.dataset.role;
  const acctId = el.dataset.acct;
  const optId = el.dataset.opt;

  if (role === 'tap') { doTap(acctId, optId, e); return; }
  if (role === 'del-opt') { deleteOption(acctId, optId); return; }
  if (role === 'label') { makeEditable(el, () => saveLabel(el, acctId, optId)); return; }
  if (role === 'number') { makeEditable(el, () => saveNumber(el, acctId, optId), true); return; }
  if (role === 'title') { makeEditable(el, () => saveTitle(el, acctId)); return; }
}

// ── TAP ──
function doTap(acctId, optId, e) {
  const acct = state.accounts.find(a => a.id === acctId);
  const opt = acct.options.find(o => o.id === optId);
  opt.count++;
  save();
  updateCounterDOM(acct, optId);
  updateStatsDOM(acct);
  updateSidebarCount(acct);
  // ripple
  const btn = e.currentTarget || e.target.closest('.btn-tap');
  if (btn) {
    const r = document.createElement('span');
    r.className = 'ripple-el';
    const rect = btn.getBoundingClientRect();
    r.style.left = (e.clientX - rect.left - 20) + 'px';
    r.style.top = (e.clientY - rect.top - 20) + 'px';
    btn.appendChild(r);
    setTimeout(() => r.remove(), 500);
  }
  // pop number
  const numEl = document.getElementById('num-'+optId);
  if (numEl) { numEl.classList.remove('popping'); void numEl.offsetWidth; numEl.classList.add('popping'); }
}

function updateCounterDOM(acct, changedOptId) {
  const total = acct.options.reduce((s,o) => s+o.count, 0);
  acct.options.forEach(opt => {
    const pct = total > 0 ? Math.round(opt.count/total*100) : 0;
    const numEl = document.getElementById('num-'+opt.id);
    const barEl = document.getElementById('bar-'+opt.id);
    const pctEl = document.getElementById('pct-'+opt.id);
    if (numEl) numEl.textContent = opt.count;
    if (barEl) barEl.style.width = pct + '%';
    if (pctEl) pctEl.textContent = pct + '%';
  });
}

function updateStatsDOM(acct) {
  const total = acct.options.reduce((s,o) => s+o.count, 0);
  const totalEl = document.getElementById('stats-total-num');
  if (totalEl) totalEl.textContent = total;
  const rows = document.querySelectorAll('#stats-rows .stat-row');
  rows.forEach((row, i) => {
    const opt = acct.options[i]; if (!opt) return;
    const pct = total > 0 ? Math.round(opt.count/total*100) : 0;
    const bar = row.querySelector('.stat-bar');
    const nums = row.querySelector('.stat-nums');
    if (bar) bar.style.width = pct + '%';
    if (nums) nums.textContent = opt.count + ' · ' + pct + '%';
  });
}

function updateSidebarCount(acct) {
  document.querySelectorAll('.account-item').forEach(item => {
    const name = item.querySelector('.account-name');
    if (name && name.textContent === acct.name) {
      const tc = item.querySelector('.account-total');
      if (tc) tc.textContent = acct.options.reduce((s,o)=>s+o.count,0);
    }
  });
  // simpler: re-render sidebar (cheap)
  renderSidebar();
}

// ── EDITABLE ──
function makeEditable(el, onSave, numericOnly) {
  if (el.contentEditable === 'true') return;
  el.contentEditable = 'true';
  el.focus();
  const range = document.createRange();
  range.selectNodeContents(el);
  range.collapse(false);
  window.getSelection().removeAllRanges();
  window.getSelection().addRange(range);

  function finish() {
    el.contentEditable = 'false';
    el.removeEventListener('blur', finish);
    el.removeEventListener('keydown', onKey);
    onSave();
  }
  function onKey(e) {
    if (e.key === 'Enter') { e.preventDefault(); el.blur(); }
    if (numericOnly && !/[0-9]|Backspace|Delete|ArrowLeft|ArrowRight|Tab/.test(e.key)) e.preventDefault();
  }
  el.addEventListener('blur', finish);
  el.addEventListener('keydown', onKey);
}

function saveTitle(el, acctId) {
  const acct = state.accounts.find(a => a.id === acctId);
  if (!acct) return;
  acct.name = el.textContent.trim() || acct.name;
  el.textContent = acct.name;
  save(); renderSidebar();
}

function saveLabel(el, acctId, optId) {
  const acct = state.accounts.find(a => a.id === acctId);
  const opt = acct?.options.find(o => o.id === optId);
  if (!opt) return;
  opt.name = el.textContent.trim() || opt.name;
  el.textContent = opt.name;
  save();
  // update stats row name
  const rows = document.querySelectorAll('#stats-rows .stat-name');
  const idx = acct.options.findIndex(o => o.id === optId);
  if (rows[idx]) rows[idx].textContent = opt.name;
}

function saveNumber(el, acctId, optId) {
  const acct = state.accounts.find(a => a.id === acctId);
  const opt = acct?.options.find(o => o.id === optId);
  if (!opt) return;
  const val = parseInt(el.textContent.replace(/\D/g,'')) || 0;
  opt.count = Math.max(0, val);
  el.textContent = opt.count;
  save();
  updateCounterDOM(acct, optId);
  updateStatsDOM(acct);
  renderSidebar();
}

// ── OPTIONS ──
function addOptionInline() {
  const name = prompt('Nombre de la nueva opción:');
  if (!name || !name.trim()) return;
  const acct = state.accounts.find(a => a.id === state.activeId);
  acct.options.push({ id: uid(), name: name.trim(), count: 0 });
  save();
  renderAccountView();
}

function deleteOption(acctId, optId) {
  if (!confirm('¿Eliminar esta opción y su conteo?')) return;
  const acct = state.accounts.find(a => a.id === acctId);
  acct.options = acct.options.filter(o => o.id !== optId);
  save();
  renderAccountView();
}

function resetAccount(acctId) {
  if (!confirm('¿Resetear todos los contadores a 0?')) return;
  const acct = state.accounts.find(a => a.id === acctId);
  acct.options.forEach(o => o.count = 0);
  save(); renderAccountView(); renderSidebar();
}

// ── SHARE ──
function shareAccount(acctId) {
  const acct = state.accounts.find(a => a.id === acctId);
  const url = getShareUrl(acct);
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById('share-btn');
    if (btn) { btn.textContent = '✓ Copiado'; btn.classList.add('copied'); }
    setTimeout(() => { const b = document.getElementById('share-btn'); if(b){b.textContent='⬡ Compartir'; b.classList.remove('copied');} }, 2500);
  }).catch(() => prompt('Copia este enlace:', url));
}

// ── MODAL ──
function openNewAccountModal() {
  modalOptionRows = [''];
  document.getElementById('modal-acct-name').value = '';
  renderModalOptions();
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('modal-acct-name').focus(), 120);
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

function renderModalOptions() {
  const container = document.getElementById('modal-options');
  container.innerHTML = '';
  modalOptionRows.forEach((val, i) => {
    const row = document.createElement('div');
    row.className = 'option-row';
    const inp = document.createElement('input');
    inp.className = 'form-input';
    inp.placeholder = 'Opción ' + (i+1);
    inp.value = val;
    inp.addEventListener('input', () => { modalOptionRows[i] = inp.value; });
    inp.addEventListener('keydown', e => { if(e.key==='Enter'){e.preventDefault(); addModalOptionRow();} });
    const rm = document.createElement('button');
    rm.className = 'btn-rm'; rm.textContent = '✕';
    rm.addEventListener('click', () => { modalOptionRows.splice(i,1); renderModalOptions(); });
    row.appendChild(inp); row.appendChild(rm);
    container.appendChild(row);
  });
  const inputs = container.querySelectorAll('input');
  if (inputs.length) inputs[inputs.length-1].focus();
}

function addModalOptionRow() {
  modalOptionRows.push('');
  renderModalOptions();
}

function createAccount() {
  const name = document.getElementById('modal-acct-name').value.trim();
  if (!name) { document.getElementById('modal-acct-name').focus(); return; }
  const options = modalOptionRows.filter(o=>o.trim()).map(o=>({id:uid(),name:o.trim(),count:0}));
  if (!options.length) { showToast('Añade al menos una opción'); return; }
  const acct = { id: uid(), name, options };
  state.accounts.push(acct);
  state.activeId = acct.id;
  save(); closeModal(); renderSidebar(); renderAccountView();
}

// ── THEME ──
function setTheme(dark) {
  state.darkMode = dark;
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  document.getElementById('theme-toggle').textContent = dark ? '☀️' : '🌙';
}

// ── INIT ──
load();
loadFromHash();
setTheme(state.darkMode);

document.getElementById('theme-toggle').addEventListener('click', () => { setTheme(!state.darkMode); save(); });

const menuBtn = document.getElementById('menu-toggle');
const sidebar = document.getElementById('sidebar');
function checkMobile() { menuBtn.style.display = window.innerWidth <= 600 ? 'flex' : 'none'; }
checkMobile();
menuBtn.addEventListener('click', () => sidebar.classList.toggle('open'));
window.addEventListener('resize', checkMobile);

document.getElementById('btn-new-account').addEventListener('click', openNewAccountModal);
document.getElementById('btn-empty-create').addEventListener('click', openNewAccountModal);
document.getElementById('btn-cancel-modal').addEventListener('click', closeModal);
document.getElementById('btn-create-account').addEventListener('click', createAccount);
document.getElementById('btn-add-row').addEventListener('click', addModalOptionRow);
document.getElementById('modal-acct-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); addModalOptionRow(); }
});
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

renderSidebar();
renderAccountView();
</script>
