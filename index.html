<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Contador</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #f2f5e8;
    --bg2:      #e8edd8;
    --bg3:      #dde3ca;
    --surface:  #f9faf3;
    --border:   #c8d0a8;
    --text:     #1a1e10;
    --text2:    #4a5230;
    --text3:    #8a9468;
    --lime:     #a8c400;
    --lime2:    #c4e000;
    --lime-dim: #d6e87a;
    --lime-bg:  #eef5c0;
    --lime-dark:#7a9200;
    --shadow:   0 2px 12px rgba(0,0,0,0.07);
    --shadow-lg:0 8px 32px rgba(0,0,0,0.11);
    --radius:   6px;
    --radius-lg:12px;
  }
  [data-theme="dark"] {
    --bg:       #0e1008;
    --bg2:      #161a0c;
    --bg3:      #1e2410;
    --surface:  #131508;
    --border:   #2e3818;
    --text:     #eef2d8;
    --text2:    #aab870;
    --text3:    #606e38;
    --lime:     #b8d400;
    --lime2:    #ccec00;
    --lime-dim: #8aa000;
    --lime-bg:  #1c2208;
    --lime-dark:#d8f000;
    --shadow:   0 2px 12px rgba(0,0,0,0.4);
    --shadow-lg:0 8px 32px rgba(0,0,0,0.55);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
  }

  /* ─ TOPBAR ─ */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex; align-items: center; justify-content: space-between;
    height: 56px; position: sticky; top: 0; z-index: 100;
    box-shadow: var(--shadow);
  }
  .brand {
    font-family: 'Playfair Display', serif;
    font-size: 22px; font-weight: 900; letter-spacing: -0.5px;
    color: var(--lime-dark);
  }
  [data-theme="dark"] .brand { color: var(--lime2); }
  .brand span { color: var(--text); }
  .topbar-actions { display: flex; gap: 8px; align-items: center; }
  .btn-icon {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text2);
    width: 36px; height: 36px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; transition: all 0.15s;
  }
  .btn-icon:hover { background: var(--bg3); color: var(--text); }

  /* ─ LAYOUT ─ */
  .layout { display: flex; min-height: calc(100vh - 56px); }

  /* ─ SIDEBAR ─ */
  .sidebar {
    width: 240px; background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; flex-shrink: 0;
  }
  .sidebar-header {
    padding: 16px; border-bottom: 1px solid var(--border);
    font-family: 'DM Mono', monospace; font-size: 10px;
    letter-spacing: 2px; text-transform: uppercase; color: var(--text3);
  }
  .accounts-list { flex: 1; overflow-y: auto; padding: 8px; }
  .account-item {
    padding: 10px 12px; border-radius: var(--radius);
    cursor: pointer; display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 2px;
    transition: background 0.15s; border: 1px solid transparent;
  }
  .account-item:hover { background: var(--bg2); }
  .account-item.active { background: var(--lime-bg); border-color: var(--lime); }
  .account-item.active .account-name { color: var(--lime-dark); font-weight: 500; }
  [data-theme="dark"] .account-item.active .account-name { color: var(--lime2); }
  .account-name { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
  .account-total { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); margin-left: 8px; flex-shrink: 0; }
  .delete-acct {
    background: none; border: none; cursor: pointer;
    color: var(--text3); font-size: 13px; padding: 2px 5px;
    border-radius: 3px; display: none; transition: color 0.15s;
  }
  .account-item:hover .delete-acct { display: block; }
  .delete-acct:hover { color: #e05a4a; }
  .btn-new-account {
    margin: 12px; padding: 10px;
    background: var(--bg2); border: 1.5px dashed var(--border);
    border-radius: var(--radius); color: var(--text3);
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    cursor: pointer; transition: all 0.15s; text-align: center;
  }
  .btn-new-account:hover { border-color: var(--lime); color: var(--lime-dark); background: var(--lime-bg); }

  /* ─ MAIN ─ */
  .main { flex: 1; padding: 32px; overflow-y: auto; }

  .empty-state {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 60vh; gap: 16px;
    color: var(--text3); text-align: center;
  }
  .empty-state .big-icon { font-size: 64px; opacity: 0.25; }
  .empty-state h2 { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--text2); }
  .empty-state p { font-size: 14px; max-width: 300px; line-height: 1.6; }

  /* ─ ACCOUNT HEADER ─ */
  .acct-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 32px; flex-wrap: wrap;
  }
  .acct-title {
    font-family: 'Playfair Display', serif;
    font-size: 32px; font-weight: 900; letter-spacing: -1px;
    color: var(--text); flex: 1;
  }
  .header-btns { display: flex; gap: 8px; flex-shrink: 0; }
  .hdr-btn {
    padding: 8px 14px; background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); font-size: 13px; color: var(--text2);
    cursor: pointer; display: flex; align-items: center; gap: 6px;
    transition: all 0.15s; font-family: 'DM Sans', sans-serif;
  }
  .hdr-btn:hover { background: var(--bg3); color: var(--text); }
  .hdr-btn.active-edit { background: var(--lime-bg); border-color: var(--lime); color: var(--lime-dark); font-weight: 500; }
  [data-theme="dark"] .hdr-btn.active-edit { color: var(--lime2); }
  .hdr-btn.copied { background: var(--lime-bg); border-color: var(--lime); color: var(--lime-dark); }

  /* ─ EDIT MODE BANNER ─ */
  .edit-banner {
    display: none; align-items: center; gap: 12px; flex-wrap: wrap;
    background: var(--lime-bg); border: 1px solid var(--lime);
    border-radius: var(--radius); padding: 10px 16px; margin-bottom: 20px;
    font-size: 13px; color: var(--lime-dark);
  }
  [data-theme="dark"] .edit-banner { color: var(--lime2); }
  .edit-banner.show { display: flex; }
  .edit-banner strong { font-weight: 500; }
  .edit-actions { display: flex; gap: 8px; margin-left: auto; flex-wrap: wrap; }
  .edit-action-btn {
    padding: 5px 12px; border-radius: var(--radius);
    font-size: 12px; font-family: 'DM Sans', sans-serif; cursor: pointer;
    transition: all 0.15s; border: 1px solid var(--lime);
    background: var(--surface); color: var(--lime-dark);
  }
  [data-theme="dark"] .edit-action-btn { color: var(--lime2); }
  .edit-action-btn:hover { background: var(--lime-bg); }
  .edit-action-btn.danger { border-color: #e05a4a; color: #e05a4a; }
  .edit-action-btn.danger:hover { background: #fdecea; }

  /* ─ COUNTERS GRID ─ */
  .counters-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px; margin-bottom: 40px;
  }

  /* ─ COUNTER CARD (tap button) ─ */
  .counter-card {
    border: none; border-radius: var(--radius-lg);
    padding: 0; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 160px; position: relative; overflow: hidden;
    transition: transform 0.1s, box-shadow 0.15s, filter 0.15s;
    box-shadow: var(--shadow);
    font-family: 'DM Sans', sans-serif;
  }
  .counter-card:hover { box-shadow: var(--shadow-lg); filter: brightness(1.06); }
  .counter-card:active { transform: scale(0.96); }

  .counter-card .c-name {
    font-size: 15px; font-weight: 500; letter-spacing: 0.1px;
    opacity: 0.75; margin-bottom: 10px; text-align: center;
    padding: 0 16px; line-height: 1.3;
  }
  .counter-card .c-num {
    font-family: 'DM Mono', monospace;
    font-size: 64px; font-weight: 500; line-height: 1;
    letter-spacing: -2px;
  }

  /* edit overlay on cards */
  .counter-card .card-edit-overlay {
    display: none; position: absolute; inset: 0;
    background: rgba(0,0,0,0.55); border-radius: var(--radius-lg);
    flex-direction: column; align-items: center; justify-content: center;
    gap: 8px;
  }
  body.edit-mode .counter-card .card-edit-overlay { display: flex; }
  body.edit-mode .counter-card { cursor: default; }
  body.edit-mode .counter-card:active { transform: none; }
  .card-edit-btn {
    padding: 6px 16px; border-radius: 20px;
    background: white; color: #111; border: none;
    font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer;
    font-weight: 500; transition: background 0.1s; white-space: nowrap;
  }
  .card-edit-btn:hover { background: #f0f0f0; }
  .card-edit-btn.red { background: #e05a4a; color: white; }
  .card-edit-btn.red:hover { background: #c84030; }

  /* ─ ADD OPTION (edit mode only) ─ */
  .btn-add-option {
    display: none;
    background: var(--surface); border: 2px dashed var(--border);
    border-radius: var(--radius-lg); min-height: 160px;
    flex-direction: column; align-items: center; justify-content: center;
    gap: 8px; cursor: pointer; color: var(--text3);
    font-family: 'DM Sans', sans-serif; font-size: 13px; transition: all 0.15s;
  }
  body.edit-mode .btn-add-option { display: flex; }
  .btn-add-option:hover { border-color: var(--lime); color: var(--lime-dark); background: var(--lime-bg); }
  .btn-add-option .plus { font-size: 28px; font-weight: 300; }

  /* ─ STATS SECTION ─ */
  .stats-section {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 24px; box-shadow: var(--shadow);
  }
  .stats-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px; flex-wrap: wrap; gap: 10px;
  }
  .stats-label {
    font-family: 'DM Mono', monospace; font-size: 10px;
    letter-spacing: 2px; text-transform: uppercase; color: var(--text3);
  }
  .stats-total-val {
    font-family: 'Playfair Display', serif; font-size: 18px; color: var(--text);
  }
  .stats-total-val span { font-family: 'DM Mono', monospace; font-size: 14px; color: var(--lime-dark); }
  [data-theme="dark"] .stats-total-val span { color: var(--lime2); }

  /* view switch */
  .view-switch {
    display: flex; background: var(--bg2); border: 1px solid var(--border);
    border-radius: 20px; padding: 3px; gap: 2px;
  }
  .vsw-btn {
    padding: 4px 14px; border-radius: 16px; border: none;
    font-family: 'DM Sans', sans-serif; font-size: 12px;
    cursor: pointer; transition: all 0.15s; color: var(--text3);
    background: none;
  }
  .vsw-btn.active { background: var(--lime); color: #1a1e10; font-weight: 500; }

  /* bars view */
  .stat-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .stat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .stat-name { font-size: 13px; color: var(--text2); width: 130px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
  .stat-bar-wrap { flex: 1; height: 7px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
  .stat-bar { height: 100%; border-radius: 4px; transition: width 0.4s cubic-bezier(0.4,0,0.2,1); }
  .stat-nums { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text3); text-align: right; width: 80px; flex-shrink: 0; }

  /* pie chart view */
  .pie-wrap { display: flex; align-items: center; gap: 32px; flex-wrap: wrap; }
  #pie-canvas { flex-shrink: 0; }
  .pie-legend { display: flex; flex-direction: column; gap: 10px; }
  .pie-legend-item { display: flex; align-items: center; gap: 10px; font-size: 13px; }
  .pie-legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .pie-legend-name { color: var(--text2); flex: 1; }
  .pie-legend-pct { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text3); }

  /* ─ RIPPLE ─ */
  @keyframes ripple { from { transform: scale(0); opacity: 0.4; } to { transform: scale(5); opacity: 0; } }
  .ripple-el {
    position: absolute; width: 40px; height: 40px; border-radius: 50%;
    background: rgba(255,255,255,0.6); pointer-events: none;
    animation: ripple 0.5s ease-out forwards; transform-origin: center;
  }
  @keyframes pop { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }
  .popping { animation: pop 0.15s ease-out; }

  /* ─ MODAL ─ */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    backdrop-filter: blur(4px); z-index: 200;
    display: flex; align-items: center; justify-content: center; padding: 20px;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 32px; width: 100%; max-width: 440px;
    box-shadow: var(--shadow-lg); transform: translateY(12px);
    transition: transform 0.2s; max-height: 90vh; overflow-y: auto;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal h2 { font-family: 'Playfair Display', serif; font-size: 24px; margin-bottom: 24px; }
  .form-group { margin-bottom: 16px; }
  .form-label {
    display: block; font-size: 11px; font-family: 'DM Mono', monospace;
    letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3); margin-bottom: 6px;
  }
  .form-input {
    width: 100%; padding: 10px 12px; background: var(--bg);
    border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
    transition: border-color 0.15s;
  }
  .form-input:focus { outline: none; border-color: var(--lime); }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }
  .btn-primary {
    padding: 10px 22px; background: var(--lime); border: none;
    border-radius: var(--radius); color: #1a1e10; font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.15s;
  }
  .btn-primary:hover { background: var(--lime2); }
  .btn-secondary {
    padding: 10px 22px; background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text2);
    font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; transition: all 0.15s;
  }
  .btn-secondary:hover { background: var(--bg3); }
  .options-preview { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
  .option-row { display: flex; gap: 8px; align-items: center; }
  .option-row .form-input { flex: 1; }
  .btn-rm {
    background: none; border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text3); cursor: pointer; padding: 0 10px; height: 38px; transition: all 0.15s;
  }
  .btn-rm:hover { border-color: #e05a4a; color: #e05a4a; }
  .btn-add-row {
    padding: 8px; background: var(--bg2); border: 1px dashed var(--border);
    border-radius: var(--radius); color: var(--text3); cursor: pointer;
    font-size: 13px; transition: all 0.15s; font-family: 'DM Sans', sans-serif;
    width: 100%; margin-top: 8px;
  }
  .btn-add-row:hover { border-color: var(--lime); color: var(--lime-dark); }

  /* ─ INLINE EDIT INPUTS ─ */
  .inline-edit-wrap {
    display: flex; gap: 8px; align-items: center; margin-bottom: 10px;
  }
  .inline-edit-wrap .form-input { flex: 1; }

  /* ─ TOAST ─ */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text); color: var(--bg);
    padding: 10px 20px; border-radius: 20px;
    font-size: 13px; font-family: 'DM Mono', monospace;
    z-index: 300; transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    pointer-events: none; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ─ RESPONSIVE ─ */
  @media (max-width: 600px) {
    .sidebar { width: 0; overflow: hidden; position: fixed; z-index: 50; height: 100vh; top: 56px; transition: width 0.2s; }
    .sidebar.open { width: 240px; box-shadow: var(--shadow-lg); }
    .main { padding: 20px 16px; }
    .counters-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
    .acct-title { font-size: 24px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">cont<span>a</span>dor</div>
  <div class="topbar-actions">
    <button class="btn-icon" id="theme-toggle" title="Cambiar tema">🌙</button>
    <button class="btn-icon" id="menu-toggle" style="display:none" title="Menú">☰</button>
  </div>
</div>

<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">Cuentas</div>
    <div class="accounts-list" id="accounts-list"></div>
    <button class="btn-new-account" id="btn-new-account">+ Nueva cuenta</button>
  </div>
  <div class="main" id="main-view">
    <div class="empty-state" id="empty-state">
      <div class="big-icon">◈</div>
      <h2>Sin cuentas aún</h2>
      <p>Crea tu primera cuenta para empezar a registrar datos.</p>
      <button class="btn-primary" id="btn-empty-create">Crear cuenta</button>
    </div>
    <div id="account-view" style="display:none"></div>
  </div>
</div>

<!-- Modal nueva cuenta -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2>Nueva cuenta</h2>
    <div class="form-group">
      <label class="form-label">Nombre de la cuenta</label>
      <input class="form-input" id="modal-acct-name" placeholder="ej: Encuesta sabores" maxlength="40"/>
    </div>
    <div class="form-group">
      <label class="form-label">Opciones a contar</label>
      <div class="options-preview" id="modal-options"></div>
      <button class="btn-add-row" id="btn-add-row">+ Añadir opción</button>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" id="btn-cancel-modal">Cancelar</button>
      <button class="btn-primary" id="btn-create-account">Crear</button>
    </div>
  </div>
</div>

<!-- Modal editar cuenta -->
<div class="modal-overlay" id="edit-modal-overlay">
  <div class="modal">
    <h2>Editar cuenta</h2>
    <div class="form-group">
      <label class="form-label">Nombre de la cuenta</label>
      <input class="form-input" id="edit-acct-name" maxlength="40"/>
    </div>
    <div class="form-group">
      <label class="form-label">Opciones</label>
      <div id="edit-options-list"></div>
      <button class="btn-add-row" id="edit-btn-add-row" style="margin-top:8px">+ Añadir opción</button>
    </div>
    <div style="margin-top:8px; padding-top:16px; border-top:1px solid var(--border);">
      <button class="edit-action-btn danger" id="edit-btn-reset">Resetear todos los contadores a 0</button>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" id="btn-cancel-edit">Cancelar</button>
      <button class="btn-primary" id="btn-save-edit">Guardar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── COLOUR PALETTES ──
// Each palette entry: [bg, text, dotColor]
function getOptionColors(n) {
  // lime hsl(74, 100%, 38%) approx
  if (n === 1) return [['#a8c400','#1a1e10','#a8c400']];
  if (n === 2) return [
    ['#a8c400','#1a1e10','#a8c400'],  // lime
    ['#9b38d4','#f0e8ff','#9b38d4'],  // complementary violet
  ];
  if (n === 3) return [
    ['#a8c400','#1a1e10','#a8c400'],  // lime
    ['#0089c4','#e8f6ff','#0089c4'],  // blue (triadic ~240°)
    ['#c44800','#fff0e8','#c44800'],  // orange-red (triadic ~0°)
  ];
  // 4+ shades of lime/green spectrum
  const palette = [
    ['#a8c400','#1a1e10','#a8c400'],
    ['#78a800','#f0ffdc','#78a800'],
    ['#c8e840','#1a1e10','#c8e840'],
    ['#52880a','#e8ffcc','#52880a'],
    ['#e4f560','#1a1e10','#e4f560'],
    ['#3a6800','#d8ffb0','#3a6800'],
    ['#f0ff80','#1a1e10','#f0ff80'],
    ['#264d00','#c0ff90','#264d00'],
  ];
  return Array.from({length: n}, (_,i) => palette[i % palette.length]);
}

// dark-mode adapted colours (same hue, adjusted)
function getOptionColorsDark(n) {
  if (n === 1) return [['#b8d400','#0e1008','#b8d400']];
  if (n === 2) return [
    ['#b8d400','#0e1008','#b8d400'],
    ['#b060e8','#f0e8ff','#b060e8'],
  ];
  if (n === 3) return [
    ['#b8d400','#0e1008','#b8d400'],
    ['#20a8e0','#e0f6ff','#20a8e0'],
    ['#e06020','#fff0e0','#e06020'],
  ];
  const palette = [
    ['#b8d400','#0e1008','#b8d400'],
    ['#88c400','#0e1e00','#88c400'],
    ['#d8f040','#0e1008','#d8f040'],
    ['#60a010','#d8ffe0','#60a010'],
    ['#ecff70','#0e1008','#ecff70'],
    ['#407800','#c8ffb0','#407800'],
    ['#f8ff90','#0e1008','#f8ff90'],
    ['#1e3800','#b0ff80','#1e3800'],
  ];
  return Array.from({length: n}, (_,i) => palette[i % palette.length]);
}

// ── STATE ──
let state = { accounts: [], activeId: null, darkMode: false, statsView: 'bars' };
let modalOptionRows = [];
let editModalData = null; // {name, options:[{id,name,count}]}
let statsViewMode = 'bars'; // 'bars' | 'pie'

function save() { localStorage.setItem('contador_v3', JSON.stringify(state)); }
function load() { try { const r = localStorage.getItem('contador_v3'); if(r) state = JSON.parse(r); statsViewMode = state.statsView || 'bars'; } catch(e){} }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── SHARE ──
function getShareUrl(account) {
  return location.origin + location.pathname + '#share=' + btoa(encodeURIComponent(JSON.stringify(account)));
}
function loadFromHash() {
  const hash = location.hash;
  if (!hash.startsWith('#share=')) return;
  try {
    const data = JSON.parse(decodeURIComponent(atob(hash.slice(7))));
    data.id = uid(); data.name = data.name + ' (importada)';
    state.accounts.push(data); state.activeId = data.id; save();
    history.replaceState(null,'',location.pathname);
    showToast('✓ Cuenta importada');
  } catch(e) {}
}

// ── SIDEBAR ──
function renderSidebar() {
  const list = document.getElementById('accounts-list');
  list.innerHTML = '';
  state.accounts.forEach(acct => {
    const total = acct.options.reduce((s,o)=>s+o.count,0);
    const el = document.createElement('div');
    el.className = 'account-item' + (acct.id === state.activeId ? ' active' : '');
    el.innerHTML = `<span class="account-name">${escHtml(acct.name)}</span><span class="account-total">${total}</span><button class="delete-acct">✕</button>`;
    el.querySelector('.delete-acct').addEventListener('click', e => { e.stopPropagation(); deleteAccount(acct.id); });
    el.addEventListener('click', () => selectAccount(acct.id));
    list.appendChild(el);
  });
}
function selectAccount(id) {
  state.activeId = id; save();
  document.body.classList.remove('edit-mode');
  renderSidebar(); renderAccountView();
  document.getElementById('sidebar').classList.remove('open');
}
function deleteAccount(id) {
  if (!confirm('¿Eliminar esta cuenta?')) return;
  state.accounts = state.accounts.filter(a=>a.id!==id);
  if (state.activeId===id) state.activeId = state.accounts[0]?.id||null;
  save(); renderSidebar(); renderAccountView();
}

// ── ACCOUNT VIEW ──
function isDark() { return document.documentElement.getAttribute('data-theme')==='dark'; }

function renderAccountView() {
  const empty = document.getElementById('empty-state');
  const view = document.getElementById('account-view');
  const acct = state.accounts.find(a=>a.id===state.activeId);
  if (!acct) { empty.style.display='flex'; view.style.display='none'; return; }
  empty.style.display='none'; view.style.display='block';

  const colors = isDark() ? getOptionColorsDark(acct.options.length) : getOptionColors(acct.options.length);
  const total = acct.options.reduce((s,o)=>s+o.count,0);

  // Cards
  const cards = acct.options.map((opt,i) => {
    const [bg, tc, dot] = colors[i] || colors[0];
    return `
      <button class="counter-card" style="background:${bg};color:${tc}"
        data-role="tap" data-acct="${acct.id}" data-opt="${opt.id}">
        <span class="c-name">${escHtml(opt.name)}</span>
        <span class="c-num" id="num-${opt.id}">${opt.count}</span>
        <div class="card-edit-overlay">
          <button class="card-edit-btn" data-role="edit-name" data-acct="${acct.id}" data-opt="${opt.id}">✎ Renombrar</button>
          <button class="card-edit-btn" data-role="edit-num" data-acct="${acct.id}" data-opt="${opt.id}">Editar número</button>
          <button class="card-edit-btn red" data-role="del-opt" data-acct="${acct.id}" data-opt="${opt.id}">✕ Eliminar</button>
        </div>
      </button>`;
  }).join('');

  // Stats rows
  const statsRows = acct.options.map((opt,i) => {
    const [bg,tc,dot] = colors[i]||colors[0];
    const pct = total>0 ? Math.round(opt.count/total*100) : 0;
    return `<div class="stat-row">
      <span class="stat-dot" style="background:${dot}"></span>
      <span class="stat-name">${escHtml(opt.name)}</span>
      <div class="stat-bar-wrap"><div class="stat-bar" style="width:${pct}%;background:${dot}"></div></div>
      <span class="stat-nums">${opt.count} · ${pct}%</span>
    </div>`;
  }).join('');

  // Pie legend
  const pieLegend = acct.options.map((opt,i) => {
    const [bg,tc,dot] = colors[i]||colors[0];
    const pct = total>0 ? Math.round(opt.count/total*100) : 0;
    return `<div class="pie-legend-item">
      <span class="pie-legend-dot" style="background:${dot}"></span>
      <span class="pie-legend-name">${escHtml(opt.name)}</span>
      <span class="pie-legend-pct">${opt.count} · ${pct}%</span>
    </div>`;
  }).join('');

  const barsActive = statsViewMode==='bars';

  view.innerHTML = `
    <div class="acct-header">
      <span class="acct-title">${escHtml(acct.name)}</span>
      <div class="header-btns">
        <button class="hdr-btn" id="edit-mode-btn">✎ Editar</button>
        <button class="hdr-btn" id="share-btn" data-acct="${acct.id}">⬡ Compartir</button>
      </div>
    </div>
    <div class="counters-grid" id="counters-grid">
      ${cards}
      <button class="btn-add-option" id="btn-add-opt-inline">
        <span class="plus">+</span><span>Añadir opción</span>
      </button>
    </div>
    <div class="stats-section">
      <div class="stats-header">
        <div>
          <div class="stats-label">Resumen</div>
          <div class="stats-total-val">Total: <span id="stats-total-num">${total}</span></div>
        </div>
        <div class="view-switch">
          <button class="vsw-btn ${barsActive?'active':''}" id="vsw-bars">Barras</button>
          <button class="vsw-btn ${!barsActive?'active':''}" id="vsw-pie">Tarta</button>
        </div>
      </div>
      <div id="stats-body">
        <div id="bars-view" style="display:${barsActive?'block':'none'}">
          ${statsRows||'<p style="color:var(--text3);font-size:13px">Sin opciones aún.</p>'}
        </div>
        <div id="pie-view" style="display:${!barsActive?'flex':'none'}" class="pie-wrap">
          <canvas id="pie-canvas" width="180" height="180"></canvas>
          <div class="pie-legend">${pieLegend}</div>
        </div>
      </div>
    </div>`;

  // Draw pie if needed
  if (statsViewMode==='pie') drawPie(acct, colors);

  // Events
  view.removeEventListener('click', handleViewClick);
  view.addEventListener('click', handleViewClick);

  // view switch
  document.getElementById('vsw-bars').addEventListener('click', () => { statsViewMode='bars'; state.statsView='bars'; save(); renderAccountView(); });
  document.getElementById('vsw-pie').addEventListener('click', () => { statsViewMode='pie'; state.statsView='pie'; save(); renderAccountView(); });

  // edit mode btn
  document.getElementById('edit-mode-btn').addEventListener('click', () => openEditModal(acct.id));

  // share btn
  document.getElementById('share-btn').addEventListener('click', () => shareAccount(acct.id));

  // add option
  document.getElementById('btn-add-opt-inline').addEventListener('click', addOptionInline);
}

function drawPie(acct, colors) {
  const canvas = document.getElementById('pie-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const total = acct.options.reduce((s,o)=>s+o.count,0);
  ctx.clearRect(0,0,180,180);
  if (!total) {
    ctx.fillStyle = isDark() ? '#2e3818' : '#dde3ca';
    ctx.beginPath(); ctx.arc(90,90,80,0,Math.PI*2); ctx.fill();
    return;
  }
  let startAngle = -Math.PI/2;
  acct.options.forEach((opt,i) => {
    const slice = (opt.count/total) * Math.PI*2;
    const [bg,tc,dot] = colors[i]||colors[0];
    ctx.beginPath();
    ctx.moveTo(90,90);
    ctx.arc(90,90,80,startAngle,startAngle+slice);
    ctx.closePath();
    ctx.fillStyle = dot;
    ctx.fill();
    ctx.strokeStyle = isDark() ? '#0e1008' : '#f9faf3';
    ctx.lineWidth = 2;
    ctx.stroke();
    startAngle += slice;
  });
  // center hole
  ctx.beginPath(); ctx.arc(90,90,36,0,Math.PI*2);
  ctx.fillStyle = isDark() ? '#131508' : '#f9faf3';
  ctx.fill();
  // total in center
  ctx.fillStyle = isDark() ? '#eef2d8' : '#1a1e10';
  ctx.font = 'bold 20px DM Mono, monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(total, 90, 90);
}

// ── CLICK DELEGATION ──
function handleViewClick(e) {
  const el = e.target.closest('[data-role]');
  if (!el) return;
  const role = el.dataset.role;
  const acctId = el.dataset.acct;
  const optId = el.dataset.opt;

  if (role === 'tap') {
    if (document.body.classList.contains('edit-mode')) return;
    doTap(acctId, optId, e); return;
  }
  if (role === 'edit-name') { promptRenameOption(acctId, optId); return; }
  if (role === 'edit-num') { promptEditNumber(acctId, optId); return; }
  if (role === 'del-opt') { deleteOption(acctId, optId); return; }
}

// ── TAP ──
function doTap(acctId, optId, e) {
  const acct = state.accounts.find(a=>a.id===acctId);
  const opt = acct.options.find(o=>o.id===optId);
  opt.count++; save();
  updateCounterDOM(acct);
  updateStatsDOM(acct);
  renderSidebar();
  // ripple
  const card = e.target.closest('.counter-card');
  if (card) {
    const r = document.createElement('span'); r.className='ripple-el';
    const rect = card.getBoundingClientRect();
    r.style.left=(e.clientX-rect.left-20)+'px'; r.style.top=(e.clientY-rect.top-20)+'px';
    card.appendChild(r); setTimeout(()=>r.remove(),600);
  }
  const numEl = document.getElementById('num-'+optId);
  if (numEl) { numEl.classList.remove('popping'); void numEl.offsetWidth; numEl.classList.add('popping'); }
}

function updateCounterDOM(acct) {
  acct.options.forEach(opt => {
    const el = document.getElementById('num-'+opt.id);
    if (el) el.textContent = opt.count;
  });
}

function updateStatsDOM(acct) {
  const total = acct.options.reduce((s,o)=>s+o.count,0);
  const totalEl = document.getElementById('stats-total-num');
  if (totalEl) totalEl.textContent = total;
  const colors = isDark() ? getOptionColorsDark(acct.options.length) : getOptionColors(acct.options.length);
  if (statsViewMode === 'bars') {
    const rows = document.querySelectorAll('#bars-view .stat-row');
    rows.forEach((row,i) => {
      const opt = acct.options[i]; if (!opt) return;
      const pct = total>0 ? Math.round(opt.count/total*100) : 0;
      const bar = row.querySelector('.stat-bar');
      const nums = row.querySelector('.stat-nums');
      if (bar) bar.style.width = pct+'%';
      if (nums) nums.textContent = opt.count+' · '+pct+'%';
    });
  } else {
    drawPie(acct, colors);
    const items = document.querySelectorAll('.pie-legend-item');
    items.forEach((item,i) => {
      const opt = acct.options[i]; if (!opt) return;
      const pct = total>0 ? Math.round(opt.count/total*100) : 0;
      const pctEl = item.querySelector('.pie-legend-pct');
      if (pctEl) pctEl.textContent = opt.count+' · '+pct+'%';
    });
  }
}

// ── EDIT MODAL ──
function openEditModal(acctId) {
  const acct = state.accounts.find(a=>a.id===acctId);
  // deep copy for editing
  editModalData = { id: acct.id, name: acct.name, options: acct.options.map(o=>({...o})) };
  document.getElementById('edit-acct-name').value = acct.name;
  renderEditOptions();
  document.getElementById('edit-modal-overlay').classList.add('open');
}
function closeEditModal() { document.getElementById('edit-modal-overlay').classList.remove('open'); editModalData=null; }

function renderEditOptions() {
  const container = document.getElementById('edit-options-list');
  container.innerHTML = '';
  editModalData.options.forEach((opt,i) => {
    const row = document.createElement('div');
    row.className = 'option-row';
    row.style.marginBottom = '8px';
    const inp = document.createElement('input');
    inp.className = 'form-input'; inp.value = opt.name; inp.placeholder = 'Opción '+(i+1);
    inp.addEventListener('input', ()=>{ editModalData.options[i].name = inp.value; });
    inp.addEventListener('keydown', e=>{ if(e.key==='Enter'){e.preventDefault(); addEditOptionRow();} });
    const rm = document.createElement('button');
    rm.className='btn-rm'; rm.textContent='✕';
    rm.addEventListener('click', ()=>{ editModalData.options.splice(i,1); renderEditOptions(); });
    row.appendChild(inp); row.appendChild(rm);
    container.appendChild(row);
  });
}
function addEditOptionRow() {
  editModalData.options.push({ id: uid(), name: '', count: 0 });
  renderEditOptions();
  // focus last
  const inputs = document.querySelectorAll('#edit-options-list .form-input');
  if (inputs.length) inputs[inputs.length-1].focus();
}
function saveEditModal() {
  const name = document.getElementById('edit-acct-name').value.trim();
  if (!name) { document.getElementById('edit-acct-name').focus(); return; }
  const options = editModalData.options.filter(o=>o.name.trim()).map(o=>({...o, name:o.name.trim()}));
  if (!options.length) { showToast('Añade al menos una opción'); return; }
  const acct = state.accounts.find(a=>a.id===editModalData.id);
  acct.name = name; acct.options = options;
  save(); closeEditModal(); renderSidebar(); renderAccountView();
}
function resetFromEditModal() {
  if (!confirm('¿Resetear todos los contadores a 0?')) return;
  editModalData.options.forEach(o=>o.count=0);
  showToast('Contadores reseteados');
}

// ── OPTION INLINE EDITS (from card edit overlay) ──
function promptRenameOption(acctId, optId) {
  const acct = state.accounts.find(a=>a.id===acctId);
  const opt = acct.options.find(o=>o.id===optId);
  const name = prompt('Nuevo nombre:', opt.name);
  if (!name || !name.trim()) return;
  opt.name = name.trim(); save(); renderAccountView();
}
function promptEditNumber(acctId, optId) {
  const acct = state.accounts.find(a=>a.id===acctId);
  const opt = acct.options.find(o=>o.id===optId);
  const val = prompt('Nuevo valor:', opt.count);
  if (val===null) return;
  const n = parseInt(val);
  if (isNaN(n)||n<0) { showToast('Número no válido'); return; }
  opt.count = n; save(); renderAccountView(); renderSidebar();
}
function addOptionInline() {
  const name = prompt('Nombre de la nueva opción:');
  if (!name||!name.trim()) return;
  const acct = state.accounts.find(a=>a.id===state.activeId);
  acct.options.push({id:uid(),name:name.trim(),count:0});
  save(); renderAccountView();
}
function deleteOption(acctId, optId) {
  if (!confirm('¿Eliminar esta opción?')) return;
  const acct = state.accounts.find(a=>a.id===acctId);
  acct.options = acct.options.filter(o=>o.id!==optId);
  save(); renderAccountView();
}

// ── SHARE ──
function shareAccount(acctId) {
  const acct = state.accounts.find(a=>a.id===acctId);
  const url = getShareUrl(acct);
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById('share-btn');
    if (btn) { btn.textContent='✓ Copiado'; btn.classList.add('copied'); }
    setTimeout(()=>{ const b=document.getElementById('share-btn'); if(b){b.textContent='⬡ Compartir'; b.classList.remove('copied');} },2500);
  }).catch(()=>prompt('Copia este enlace:',url));
}

// ── NEW ACCOUNT MODAL ──
function openNewAccountModal() {
  modalOptionRows = [''];
  document.getElementById('modal-acct-name').value = '';
  renderModalOptions();
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('modal-acct-name').focus(),120);
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function renderModalOptions() {
  const container = document.getElementById('modal-options');
  container.innerHTML = '';
  modalOptionRows.forEach((val,i) => {
    const row = document.createElement('div'); row.className='option-row';
    const inp = document.createElement('input'); inp.className='form-input';
    inp.placeholder='Opción '+(i+1); inp.value=val;
    inp.addEventListener('input',()=>{ modalOptionRows[i]=inp.value; });
    inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();addModalOptionRow();}});
    const rm = document.createElement('button'); rm.className='btn-rm'; rm.textContent='✕';
    rm.addEventListener('click',()=>{ modalOptionRows.splice(i,1); renderModalOptions(); });
    row.appendChild(inp); row.appendChild(rm);
    container.appendChild(row);
  });
  const inputs = container.querySelectorAll('input');
  if (inputs.length) inputs[inputs.length-1].focus();
}
function addModalOptionRow() { modalOptionRows.push(''); renderModalOptions(); }
function createAccount() {
  const name = document.getElementById('modal-acct-name').value.trim();
  if (!name) { document.getElementById('modal-acct-name').focus(); return; }
  const options = modalOptionRows.filter(o=>o.trim()).map(o=>({id:uid(),name:o.trim(),count:0}));
  if (!options.length) { showToast('Añade al menos una opción'); return; }
  const acct = {id:uid(),name,options};
  state.accounts.push(acct); state.activeId=acct.id;
  save(); closeModal(); renderSidebar(); renderAccountView();
}

// ── THEME ──
function setTheme(dark) {
  state.darkMode = dark;
  document.documentElement.setAttribute('data-theme', dark?'dark':'light');
  document.getElementById('theme-toggle').textContent = dark?'☀️':'🌙';
  // redraw if view open
  const acct = state.accounts.find(a=>a.id===state.activeId);
  if (acct) { updateStatsDOM(acct); }
}

// ── INIT ──
load();
loadFromHash();
setTheme(state.darkMode);

document.getElementById('theme-toggle').addEventListener('click',()=>{ setTheme(!state.darkMode); save(); });

const menuBtn = document.getElementById('menu-toggle');
const sidebar = document.getElementById('sidebar');
function checkMobile() { menuBtn.style.display = window.innerWidth<=600?'flex':'none'; }
checkMobile();
menuBtn.addEventListener('click',()=>sidebar.classList.toggle('open'));
window.addEventListener('resize',checkMobile);

document.getElementById('btn-new-account').addEventListener('click',openNewAccountModal);
document.getElementById('btn-empty-create').addEventListener('click',openNewAccountModal);
document.getElementById('btn-cancel-modal').addEventListener('click',closeModal);
document.getElementById('btn-create-account').addEventListener('click',createAccount);
document.getElementById('btn-add-row').addEventListener('click',addModalOptionRow);
document.getElementById('modal-acct-name').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();addModalOptionRow();}});
document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('modal-overlay'))closeModal();});

// edit modal
document.getElementById('btn-cancel-edit').addEventListener('click',closeEditModal);
document.getElementById('btn-save-edit').addEventListener('click',saveEditModal);
document.getElementById('edit-btn-add-row').addEventListener('click',addEditOptionRow);
document.getElementById('edit-btn-reset').addEventListener('click',resetFromEditModal);
document.getElementById('edit-modal-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('edit-modal-overlay'))closeEditModal();});

renderSidebar();
renderAccountView();
</script>
