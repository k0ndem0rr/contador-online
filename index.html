<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Contador</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f2f5e8; --bg2:#e8edd8; --bg3:#dde3ca; --surface:#f9faf3; --border:#c8d0a8;
  --text:#1a1e10; --text2:#4a5230; --text3:#8a9468;
  --lime:#a8c400; --lime2:#c4e000; --lime-bg:#eef5c0; --lime-dark:#6e8a00;
  --danger:#d94030;
  --shadow:0 2px 12px rgba(0,0,0,.07); --shadow-lg:0 8px 32px rgba(0,0,0,.12);
  --r:6px; --rl:14px;
}
[data-theme="dark"] {
  --bg:#0e1008; --bg2:#161a0c; --bg3:#1e2410; --surface:#131508; --border:#2e3818;
  --text:#eef2d8; --text2:#aab870; --text3:#606e38;
  --lime:#b8d400; --lime2:#ccec00; --lime-bg:#1c2208; --lime-dark:#c8e800;
  --danger:#e05a4a;
  --shadow:0 2px 12px rgba(0,0,0,.4); --shadow-lg:0 8px 32px rgba(0,0,0,.55);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s}

/* ── TOPBAR ── */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.brand{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;letter-spacing:-.5px;color:var(--lime-dark)}
.brand em{font-style:normal;color:var(--text)}
.topbar-r{display:flex;gap:8px}
.btn-icon{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);color:var(--text2);width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s}
.btn-icon:hover{background:var(--bg3);color:var(--text)}

/* ── LAYOUT ── */
.layout{display:flex;min-height:calc(100vh - 56px)}

/* ── SIDEBAR ── */
.sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-hd{padding:16px;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text3)}
.accts-list{flex:1;overflow-y:auto;padding:8px}
.acct-item{padding:10px 12px;border-radius:var(--r);cursor:pointer;display:flex;align-items:center;gap:6px;margin-bottom:2px;transition:background .15s;border:1px solid transparent}
.acct-item:hover{background:var(--bg2)}
.acct-item.active{background:var(--lime-bg);border-color:var(--lime)}
.acct-item.active .ai-name{color:var(--lime-dark);font-weight:500}
.ai-name{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.ai-total{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);flex-shrink:0}
.ai-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:2px 5px;border-radius:3px;opacity:0;pointer-events:none;transition:opacity .15s,color .15s}
.acct-item:hover .ai-del{opacity:1;pointer-events:all}
.ai-del:hover{color:var(--danger)}
.btn-new-acct{margin:12px;padding:10px;background:var(--bg2);border:1.5px dashed var(--border);border-radius:var(--r);color:var(--text3);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .15s;text-align:center}
.btn-new-acct:hover{border-color:var(--lime);color:var(--lime-dark);background:var(--lime-bg)}

/* ── MAIN ── */
.main{flex:1;padding:32px;overflow-y:auto}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:16px;color:var(--text3);text-align:center}
.empty-state .ico{font-size:60px;opacity:.2}
.empty-state h2{font-family:'Playfair Display',serif;font-size:28px;color:var(--text2)}
.empty-state p{font-size:14px;max-width:300px;line-height:1.6}

/* ── ACCOUNT HEADER ── */
.acct-hd{display:flex;align-items:center;gap:10px;margin-bottom:28px;flex-wrap:wrap}
.title-area{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.acct-title{font-family:'Playfair Display',serif;font-size:32px;font-weight:900;letter-spacing:-1px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.title-pencil{display:none;background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;padding:4px;flex-shrink:0;transition:color .15s;line-height:1}
body.edit-mode .title-pencil{display:inline-flex}
.title-pencil:hover{color:var(--lime-dark)}
.hd-btns{display:flex;gap:8px;flex-shrink:0}
.hd-btn{padding:8px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);font-size:13px;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s;font-family:'DM Sans',sans-serif;white-space:nowrap}
.hd-btn:hover{background:var(--bg3);color:var(--text)}
.hd-btn.on{background:var(--lime-bg);border-color:var(--lime);color:var(--lime-dark);font-weight:500}
.hd-btn.copied{background:var(--lime-bg);border-color:var(--lime);color:var(--lime-dark)}

/* ── RESET BAR ── */
.reset-bar{display:none;align-items:center;justify-content:space-between;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 16px;margin-bottom:20px;flex-wrap:wrap}
body.edit-mode .reset-bar{display:flex}
.reset-bar span{font-size:13px;color:var(--text3)}
.btn-reset{padding:6px 14px;background:none;border:1px solid var(--danger);border-radius:var(--r);color:var(--danger);font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s}
.btn-reset:hover{background:var(--danger);color:#fff}

/* ── GRID ── */
.counters-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:40px}

/* ── COUNTER CARD ── */
/* Card is a DIV — no nested button problem */
.counter-card{
  position:relative; border-radius:var(--rl);
  min-height:170px; width:100%;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:10px; padding:24px 16px;
  box-shadow:var(--shadow);
  transition:transform .1s, box-shadow .15s, filter .15s;
  font-family:'DM Sans',sans-serif; text-align:center;
  overflow:hidden; user-select:none;
}
/* tap mode */
body:not(.edit-mode) .counter-card{cursor:pointer}
body:not(.edit-mode) .counter-card:hover{box-shadow:var(--shadow-lg);filter:brightness(1.06)}
body:not(.edit-mode) .counter-card:active{transform:scale(.96)}
/* edit mode */
body.edit-mode .counter-card{cursor:default}

.c-name{font-size:15px;font-weight:500;opacity:.75;line-height:1.3}
.c-num{font-family:'DM Mono',monospace;font-size:64px;font-weight:500;line-height:1;letter-spacing:-2px;border-radius:6px;transition:background .15s}

/* number editable hint in edit mode */
body.edit-mode .c-num{cursor:text}
body.edit-mode .counter-card:hover .c-num{background:rgba(0,0,0,.1)}

/* ── CARD EDIT CONTROLS (hidden until edit-mode) ── */
.card-del{
  position:absolute; top:8px; right:8px;
  background:rgba(0,0,0,.28); border:none; border-radius:50%;
  width:26px; height:26px;
  color:#fff; font-size:12px; cursor:pointer;
  display:none; align-items:center; justify-content:center;
  transition:background .15s; z-index:2;
}
body.edit-mode .card-del{display:flex}
.card-del:hover{background:var(--danger) !important}

.card-name-row{display:flex;align-items:center;justify-content:center;gap:6px}
.card-name-pencil{
  display:none; background:none; border:none; cursor:pointer;
  color:inherit; opacity:.6; font-size:14px; padding:2px; line-height:1;
  transition:opacity .15s; flex-shrink:0;
}
body.edit-mode .card-name-pencil{display:inline-flex}
.card-name-pencil:hover{opacity:1}

/* ── ADD CARD ── */
.add-card{
  display:none; border-radius:var(--rl); min-height:170px;
  background:var(--surface); border:2px dashed var(--border);
  flex-direction:column; align-items:center; justify-content:center;
  gap:8px; cursor:pointer; color:var(--text3);
  font-family:'DM Sans',sans-serif; font-size:13px; transition:all .15s;
}
body.edit-mode .add-card{display:flex}
.add-card:hover{border-color:var(--lime);color:var(--lime-dark);background:var(--lime-bg)}
.add-card .plus{font-size:28px;font-weight:300}

/* ── STATS ── */
.stats-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:24px;box-shadow:var(--shadow)}
.stats-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.stats-lbl{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
.stats-total{font-family:'Playfair Display',serif;font-size:18px}
.stats-total span{font-family:'DM Mono',monospace;font-size:14px;color:var(--lime-dark)}
.vsw{display:flex;background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:3px;gap:2px}
.vsw-btn{padding:4px 14px;border-radius:16px;border:none;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all .15s;color:var(--text3);background:none}
.vsw-btn.on{background:var(--lime);color:#1a1e10;font-weight:500}
.stat-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.stat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.stat-name{font-size:13px;color:var(--text2);width:130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.stat-bar-wrap{flex:1;height:7px;background:var(--bg3);border-radius:4px;overflow:hidden}
.stat-bar{height:100%;border-radius:4px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.stat-nums{font-family:'DM Mono',monospace;font-size:12px;color:var(--text3);width:80px;text-align:right;flex-shrink:0}
.pie-wrap{display:flex;align-items:center;gap:32px;flex-wrap:wrap}
.pie-legend{display:flex;flex-direction:column;gap:10px}
.pie-legend-item{display:flex;align-items:center;gap:10px;font-size:13px}
.pie-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.pie-name{color:var(--text2);flex:1}
.pie-pct{font-family:'DM Mono',monospace;font-size:12px;color:var(--text3)}

/* ── RIPPLE / POP ── */
@keyframes ripple{from{transform:scale(0);opacity:.35}to{transform:scale(5);opacity:0}}
.rip{position:absolute;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.55);pointer-events:none;animation:ripple .5s ease-out forwards;transform-origin:center}
@keyframes pop{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.popping{animation:pop .15s ease-out}

/* ── OVERLAYS / MODALS ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:32px;width:100%;max-width:440px;box-shadow:var(--shadow-lg);transform:translateY(12px);transition:transform .2s;max-height:90vh;overflow-y:auto}
.overlay.open .modal{transform:translateY(0)}
.modal h2{font-family:'Playfair Display',serif;font-size:24px;margin-bottom:24px}
.fg{margin-bottom:16px}
.fl{display:block;font-size:11px;font-family:'DM Mono',monospace;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.fi{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;transition:border-color .15s}
.fi:focus{outline:none;border-color:var(--lime)}
.modal-acts{display:flex;gap:10px;justify-content:flex-end;margin-top:24px}
.btn-p{padding:10px 22px;background:var(--lime);border:none;border-radius:var(--r);color:#1a1e10;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:background .15s}
.btn-p:hover{background:var(--lime2)}
.btn-s{padding:10px 22px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);color:var(--text2);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;transition:all .15s}
.btn-s:hover{background:var(--bg3)}
.btn-danger{padding:10px 22px;background:none;border:1px solid var(--danger);border-radius:var(--r);color:var(--danger);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;transition:all .15s}
.btn-danger:hover{background:var(--danger);color:#fff}
.opt-rows{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.opt-row{display:flex;gap:8px}
.opt-row .fi{flex:1}
.btn-rm{background:none;border:1px solid var(--border);border-radius:var(--r);color:var(--text3);cursor:pointer;padding:0 10px;height:38px;transition:all .15s}
.btn-rm:hover{border-color:var(--danger);color:var(--danger)}
.btn-addrow{padding:8px;background:var(--bg2);border:1px dashed var(--border);border-radius:var(--r);color:var(--text3);cursor:pointer;font-size:13px;transition:all .15s;font-family:'DM Sans',sans-serif;width:100%;margin-top:8px}
.btn-addrow:hover{border-color:var(--lime);color:var(--lime-dark)}

/* confirm dialog */
.confirm-msg{font-size:15px;color:var(--text2);line-height:1.5;margin-bottom:8px}
/* prompt dialog */
.prompt-body{display:flex;flex-direction:column;gap:12px}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:20px;font-size:13px;font-family:'DM Mono',monospace;z-index:300;transition:transform .3s cubic-bezier(.4,0,.2,1);pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  .sidebar{width:0;overflow:hidden;position:fixed;z-index:50;height:100vh;top:56px;transition:width .2s}
  .sidebar.open{width:240px;box-shadow:var(--shadow-lg)}
  .main{padding:20px 16px}
  .counters-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
  .acct-title{font-size:24px}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">cont<em>a</em>dor</div>
  <div class="topbar-r">
    <button class="btn-icon" id="theme-btn">🌙</button>
    <button class="btn-icon" id="menu-btn" style="display:none">☰</button>
  </div>
</div>

<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-hd">Cuentas</div>
    <div class="accts-list" id="accts-list"></div>
    <button class="btn-new-acct" id="btn-new-acct">+ Nueva cuenta</button>
  </div>
  <div class="main">
    <div class="empty-state" id="empty-state">
      <div class="ico">◈</div>
      <h2>Sin cuentas aún</h2>
      <p>Crea tu primera cuenta para empezar a registrar datos.</p>
      <button class="btn-p" id="btn-empty-create">Crear cuenta</button>
    </div>
    <div id="acct-view" style="display:none"></div>
  </div>
</div>

<!-- Modal nueva cuenta -->
<div class="overlay" id="new-overlay">
  <div class="modal">
    <h2>Nueva cuenta</h2>
    <div class="fg"><label class="fl">Nombre</label><input class="fi" id="new-name" placeholder="ej: Encuesta sabores" maxlength="40"/></div>
    <div class="fg">
      <label class="fl">Opciones a contar</label>
      <div class="opt-rows" id="new-opts"></div>
      <button class="btn-addrow" id="new-addrow">+ Añadir opción</button>
    </div>
    <div class="modal-acts">
      <button class="btn-s" id="new-cancel">Cancelar</button>
      <button class="btn-p" id="new-create">Crear</button>
    </div>
  </div>
</div>

<!-- Confirm dialog -->
<div class="overlay" id="confirm-overlay">
  <div class="modal" style="max-width:360px">
    <h2 id="confirm-title">¿Confirmar?</h2>
    <p class="confirm-msg" id="confirm-msg"></p>
    <div class="modal-acts">
      <button class="btn-s" id="confirm-cancel">Cancelar</button>
      <button class="btn-danger" id="confirm-ok">Confirmar</button>
    </div>
  </div>
</div>

<!-- Prompt dialog -->
<div class="overlay" id="prompt-overlay">
  <div class="modal" style="max-width:360px">
    <h2 id="prompt-title">Editar</h2>
    <div class="prompt-body">
      <input class="fi" id="prompt-input" />
    </div>
    <div class="modal-acts">
      <button class="btn-s" id="prompt-cancel">Cancelar</button>
      <button class="btn-p" id="prompt-ok">Guardar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── PALETTE ──
function getPalette(n, dk) {
  const L = [
    ['#a8c400','#1a1e10','#a8c400'],['#74a400','#f0ffe0','#74a400'],
    ['#c8e040','#1a1e10','#c8e040'],['#4e8800','#ecffcc','#4e8800'],
    ['#e0f060','#1a1e10','#e0f060'],['#346400','#d8ff90','#346400'],
    ['#f0ff78','#2a2e10','#a8aa00'],['#1e4800','#c0ff88','#1e4800'],
  ];
  const D = [
    ['#b8d400','#0e1008','#b8d400'],['#84be00','#0a1400','#84be00'],
    ['#d8f040','#0e1008','#d8f040'],['#5aaa10','#001800','#5aaa10'],
    ['#eaff66','#0e1008','#c8d800'],['#3e7800','#002800','#3e7800'],
    ['#f6ff88','#0e1008','#c0c800'],['#1c3800','#001800','#3e7800'],
  ];
  if (n===2) return dk
    ? [D[0],['#a050e8','#f0e4ff','#a050e8']]
    : [L[0],['#8830c8','#f5eeff','#8830c8']];
  if (n===3) return dk
    ? [D[0],['#18a8e0','#e0f6ff','#18a8e0'],['#e06020','#fff0e0','#e06020']]
    : [L[0],['#0080b8','#e8f6ff','#0080b8'],['#c84400','#fff0e8','#c84400']];
  const base = dk ? D : L;
  return Array.from({length:Math.max(n,1)}, (_,i) => base[i % base.length]);
}

// ── DIALOGS ──
function dlgConfirm(title, msg) {
  return new Promise(resolve => {
    document.getElementById('confirm-title').textContent = title;
    document.getElementById('confirm-msg').textContent = msg;
    const ov = document.getElementById('confirm-overlay');
    ov.classList.add('open');
    const ok  = document.getElementById('confirm-ok');
    const can = document.getElementById('confirm-cancel');
    function done(val) {
      ov.classList.remove('open');
      ok.replaceWith(ok.cloneNode(true));
      can.replaceWith(can.cloneNode(true));
      resolve(val);
    }
    document.getElementById('confirm-ok').addEventListener('click', () => done(true));
    document.getElementById('confirm-cancel').addEventListener('click', () => done(false));
    ov.addEventListener('click', e => { if (e.target===ov) done(false); }, {once:true});
  });
}

function dlgPrompt(title, placeholder, defaultVal='') {
  return new Promise(resolve => {
    document.getElementById('prompt-title').textContent = title;
    const inp = document.getElementById('prompt-input');
    inp.placeholder = placeholder; inp.value = defaultVal;
    const ov = document.getElementById('prompt-overlay');
    ov.classList.add('open');
    setTimeout(() => { inp.focus(); inp.select(); }, 80);
    const ok  = document.getElementById('prompt-ok');
    const can = document.getElementById('prompt-cancel');
    function done(val) {
      ov.classList.remove('open');
      ok.replaceWith(ok.cloneNode(true));
      can.replaceWith(can.cloneNode(true));
      inp.removeEventListener('keydown', onKey);
      resolve(val);
    }
    function onKey(e) { if (e.key==='Enter') { e.preventDefault(); done(inp.value.trim()||null); } if (e.key==='Escape') done(null); }
    inp.addEventListener('keydown', onKey);
    document.getElementById('prompt-ok').addEventListener('click', () => done(inp.value.trim()||null));
    document.getElementById('prompt-cancel').addEventListener('click', () => done(null));
    ov.addEventListener('click', e => { if (e.target===ov) done(null); }, {once:true});
  });
}

// ── STATE ──
let state = { accounts:[], activeId:null, darkMode:false, statsView:'bars' };
let editMode = false;
let statsView = 'bars';
let newOptRows = [];

function save() { localStorage.setItem('ctr_v6', JSON.stringify(state)); }
function load() { try { const r=localStorage.getItem('ctr_v6'); if(r){state=JSON.parse(r);statsView=state.statsView||'bars';} }catch(e){} }
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }
function isDark() { return document.documentElement.getAttribute('data-theme')==='dark'; }

// ── SHARE ──
function shareUrl(acct) { return location.origin+location.pathname+'#share='+btoa(encodeURIComponent(JSON.stringify(acct))); }
function loadHash() {
  if (!location.hash.startsWith('#share=')) return;
  try {
    const d=JSON.parse(decodeURIComponent(atob(location.hash.slice(7))));
    d.id=uid(); d.name=d.name+' (importada)';
    state.accounts.push(d); state.activeId=d.id; save();
    history.replaceState(null,'',location.pathname);
    toast('✓ Cuenta importada');
  }catch(e){}
}

// ── SIDEBAR ──
function renderSidebar() {
  const list=document.getElementById('accts-list');
  list.innerHTML='';
  state.accounts.forEach(acct=>{
    const tot=acct.options.reduce((s,o)=>s+o.count,0);
    const el=document.createElement('div');
    el.className='acct-item'+(acct.id===state.activeId?' active':'');
    el.innerHTML=`<span class="ai-name">${esc(acct.name)}</span><span class="ai-total">${tot}</span><button class="ai-del">✕</button>`;
    el.querySelector('.ai-del').addEventListener('click',e=>{e.stopPropagation();delAccount(acct.id);});
    el.addEventListener('click',()=>selectAccount(acct.id));
    list.appendChild(el);
  });
}
function selectAccount(id) {
  state.activeId=id; editMode=false; document.body.classList.remove('edit-mode');
  save(); renderSidebar(); renderView();
  document.getElementById('sidebar').classList.remove('open');
}
async function delAccount(id) {
  const ok=await dlgConfirm('Eliminar cuenta','¿Eliminar esta cuenta y todos sus datos?');
  if (!ok) return;
  state.accounts=state.accounts.filter(a=>a.id!==id);
  if (state.activeId===id) state.activeId=state.accounts[0]?.id||null;
  save(); renderSidebar(); renderView();
}

// ── RENDER VIEW ──
function renderView() {
  const empty=document.getElementById('empty-state');
  const view=document.getElementById('acct-view');
  const acct=state.accounts.find(a=>a.id===state.activeId);
  if (!acct){empty.style.display='flex';view.style.display='none';return;}
  empty.style.display='none'; view.style.display='block';

  const pal=getPalette(acct.options.length,isDark());
  const tot=acct.options.reduce((s,o)=>s+o.count,0);
  const isBars=statsView==='bars';

  // stats bars
  const barsHtml=acct.options.length ? acct.options.map((opt,i)=>{
    const [,,dot]=pal[i]||pal[0];
    const pct=tot>0?Math.round(opt.count/tot*100):0;
    return `<div class="stat-row">
      <span class="stat-dot" style="background:${dot}"></span>
      <span class="stat-name">${esc(opt.name)}</span>
      <div class="stat-bar-wrap"><div class="stat-bar" style="width:${pct}%;background:${dot}"></div></div>
      <span class="stat-nums">${opt.count} · ${pct}%</span></div>`;
  }).join('') : '<p style="color:var(--text3);font-size:13px">Sin opciones.</p>';

  // pie legend
  const pieLegend=acct.options.map((opt,i)=>{
    const [,,dot]=pal[i]||pal[0];
    const pct=tot>0?Math.round(opt.count/tot*100):0;
    return `<div class="pie-legend-item">
      <span class="pie-dot" style="background:${dot}"></span>
      <span class="pie-name">${esc(opt.name)}</span>
      <span class="pie-pct">${opt.count} · ${pct}%</span></div>`;
  }).join('');

  view.innerHTML=`
    <div class="acct-hd">
      <div class="title-area">
        <span class="acct-title" id="acct-title-el">${esc(acct.name)}</span>
        <button class="title-pencil" id="title-pencil-btn">✎</button>
      </div>
      <div class="hd-btns">
        <button class="hd-btn${editMode?' on':''}" id="edit-toggle-btn">${editMode?'✓ Listo':'✎ Editar'}</button>
        <button class="hd-btn" id="share-btn">⬡ Compartir</button>
      </div>
    </div>
    <div class="reset-bar">
      <span>Modo edición activo</span>
      <button class="btn-reset" id="btn-reset">↺ Resetear contadores</button>
    </div>
    <div class="counters-grid" id="cgrid"></div>
    <div class="stats-section">
      <div class="stats-hd">
        <div>
          <div class="stats-lbl">Resumen</div>
          <div class="stats-total">Total: <span id="stat-tot">${tot}</span></div>
        </div>
        <div class="vsw">
          <button class="vsw-btn${isBars?' on':''}" id="vsw-bars">Barras</button>
          <button class="vsw-btn${!isBars?' on':''}" id="vsw-pie">Tarta</button>
        </div>
      </div>
      <div id="bars-view" style="display:${isBars?'block':'none'}">${barsHtml}</div>
      <div id="pie-view" style="display:${!isBars?'flex':'none'}" class="pie-wrap">
        <canvas id="pie-cv" width="180" height="180"></canvas>
        <div class="pie-legend">${pieLegend}</div>
      </div>
    </div>`;

  if (!isBars) drawPie(acct,pal);

  // Build cards with JS (avoids innerHTML nested button issues entirely)
  buildCards(acct, pal);

  // Header events
  document.getElementById('edit-toggle-btn').addEventListener('click',()=>{
    editMode=!editMode;
    document.body.classList.toggle('edit-mode',editMode);
    document.getElementById('edit-toggle-btn').textContent=editMode?'✓ Listo':'✎ Editar';
    document.getElementById('edit-toggle-btn').classList.toggle('on',editMode);
  });
  document.getElementById('share-btn').addEventListener('click',()=>doShare(acct.id));
  document.getElementById('btn-reset').addEventListener('click',()=>doReset(acct.id));
  document.getElementById('title-pencil-btn').addEventListener('click',()=>doRenameTitle(acct.id));
  document.getElementById('vsw-bars').addEventListener('click',()=>{statsView='bars';state.statsView='bars';save();renderView();});
  document.getElementById('vsw-pie').addEventListener('click',()=>{statsView='pie';state.statsView='pie';save();renderView();});
}

// ── BUILD CARDS (pure JS, no nested button risk) ──
function buildCards(acct, pal) {
  const grid=document.getElementById('cgrid');
  grid.innerHTML='';

  acct.options.forEach((opt,i)=>{
    const [bg,tc]=pal[i]||pal[0];

    // Card div
    const card=document.createElement('div');
    card.className='counter-card';
    card.style.background=bg;
    card.style.color=tc;
    card.dataset.optId=opt.id;

    // Delete button (top-right, edit mode only)
    const delBtn=document.createElement('button');
    delBtn.className='card-del';
    delBtn.textContent='✕';
    delBtn.addEventListener('click',e=>{e.stopPropagation();doDelOpt(acct.id,opt.id);});
    card.appendChild(delBtn);

    // Name row
    const nameRow=document.createElement('div');
    nameRow.className='card-name-row';
    const nameSpan=document.createElement('span');
    nameSpan.className='c-name';
    nameSpan.textContent=opt.name;
    const namePencil=document.createElement('button');
    namePencil.className='card-name-pencil';
    namePencil.textContent='✎';
    namePencil.addEventListener('click',e=>{e.stopPropagation();doRenameOpt(acct.id,opt.id);});
    nameRow.appendChild(nameSpan);
    nameRow.appendChild(namePencil);
    card.appendChild(nameRow);

    // Number
    const numEl=document.createElement('span');
    numEl.className='c-num';
    numEl.id='num-'+opt.id;
    numEl.textContent=opt.count;
    numEl.addEventListener('click',e=>{e.stopPropagation();if(editMode)doEditNum(acct.id,opt.id,numEl);});
    card.appendChild(numEl);

    // Tap handler on card itself
    card.addEventListener('click',e=>{
      if (editMode) return;
      if (e.target===delBtn||e.target===namePencil) return;
      doTap(acct.id,opt.id,e,card);
    });

    grid.appendChild(card);
  });

  // Add-option card (div, not button — no nesting issue)
  const addCard=document.createElement('div');
  addCard.className='add-card';
  addCard.innerHTML='<span class="plus">+</span><span>Añadir opción</span>';
  addCard.addEventListener('click',()=>doAddOption(acct.id));
  grid.appendChild(addCard);
}

// ── TAP ──
function doTap(acctId, optId, e, card) {
  const acct=state.accounts.find(a=>a.id===acctId);
  const opt=acct.options.find(o=>o.id===optId);
  opt.count++; save();
  const numEl=document.getElementById('num-'+optId);
  if (numEl){numEl.textContent=opt.count;numEl.classList.remove('popping');void numEl.offsetWidth;numEl.classList.add('popping');}
  updateStats(acct); renderSidebar();
  // ripple
  const r=document.createElement('span'); r.className='rip';
  const rect=card.getBoundingClientRect();
  r.style.left=(e.clientX-rect.left-20)+'px';
  r.style.top=(e.clientY-rect.top-20)+'px';
  card.appendChild(r); setTimeout(()=>r.remove(),600);
}

// ── EDIT ACTIONS ──
async function doDelOpt(acctId, optId) {
  const acct=state.accounts.find(a=>a.id===acctId);
  const opt=acct.options.find(o=>o.id===optId);
  const ok=await dlgConfirm('Eliminar opción',`¿Eliminar "${opt.name}"?`);
  if (!ok) return;
  acct.options=acct.options.filter(o=>o.id!==optId);
  save(); renderView();
}

async function doRenameOpt(acctId, optId) {
  const acct=state.accounts.find(a=>a.id===acctId);
  const opt=acct.options.find(o=>o.id===optId);
  const n=await dlgPrompt('Renombrar opción','Nombre',opt.name);
  if (!n) return;
  opt.name=n; save(); renderView();
}

async function doEditNum(acctId, optId, numEl) {
  const acct=state.accounts.find(a=>a.id===acctId);
  const opt=acct.options.find(o=>o.id===optId);
  // inline contenteditable on the span itself
  if (numEl.contentEditable==='true') return;
  numEl.contentEditable='true'; numEl.focus();
  const rng=document.createRange(); rng.selectNodeContents(numEl); rng.collapse(false);
  window.getSelection().removeAllRanges(); window.getSelection().addRange(rng);
  function commit() {
    numEl.contentEditable='false';
    numEl.removeEventListener('blur',commit);
    numEl.removeEventListener('keydown',onKey);
    const v=parseInt(numEl.textContent.replace(/\D/g,''));
    opt.count=(!isNaN(v)&&v>=0)?v:opt.count;
    numEl.textContent=opt.count;
    save(); updateStats(acct); renderSidebar();
  }
  function onKey(ev) {
    if (ev.key==='Enter'){ev.preventDefault();numEl.blur();}
    if (!/[0-9]|Backspace|Delete|Arrow/.test(ev.key)) ev.preventDefault();
  }
  numEl.addEventListener('blur',commit);
  numEl.addEventListener('keydown',onKey);
}

async function doAddOption(acctId) {
  const n=await dlgPrompt('Nueva opción','Nombre de la opción','');
  if (!n) return;
  const acct=state.accounts.find(a=>a.id===acctId);
  acct.options.push({id:uid(),name:n,count:0});
  save(); renderView();
}

async function doReset(acctId) {
  const ok=await dlgConfirm('Resetear contadores','¿Poner todos los contadores a 0?');
  if (!ok) return;
  const acct=state.accounts.find(a=>a.id===acctId);
  acct.options.forEach(o=>o.count=0);
  save(); renderView(); renderSidebar();
}

async function doRenameTitle(acctId) {
  const acct=state.accounts.find(a=>a.id===acctId);
  const n=await dlgPrompt('Renombrar cuenta','Nombre',acct.name);
  if (!n) return;
  acct.name=n; save();
  const el=document.getElementById('acct-title-el');
  if (el) el.textContent=acct.name;
  renderSidebar();
}

// ── SHARE ──
function doShare(acctId) {
  const acct=state.accounts.find(a=>a.id===acctId);
  const url=shareUrl(acct);
  navigator.clipboard.writeText(url).then(()=>{
    const b=document.getElementById('share-btn');
    if(b){b.textContent='✓ Copiado';b.classList.add('copied');}
    setTimeout(()=>{const b=document.getElementById('share-btn');if(b){b.textContent='⬡ Compartir';b.classList.remove('copied');}},2500);
  }).catch(()=>{ toast('No se pudo copiar'); });
}

// ── STATS ──
function updateStats(acct) {
  const tot=acct.options.reduce((s,o)=>s+o.count,0);
  const totEl=document.getElementById('stat-tot');
  if (totEl) totEl.textContent=tot;
  const pal=getPalette(acct.options.length,isDark());
  if (statsView==='bars') {
    document.querySelectorAll('#bars-view .stat-row').forEach((row,i)=>{
      const opt=acct.options[i]; if(!opt)return;
      const pct=tot>0?Math.round(opt.count/tot*100):0;
      const bar=row.querySelector('.stat-bar'); if(bar)bar.style.width=pct+'%';
      const nums=row.querySelector('.stat-nums'); if(nums)nums.textContent=opt.count+' · '+pct+'%';
    });
  } else {
    drawPie(acct,pal);
    document.querySelectorAll('.pie-legend-item').forEach((item,i)=>{
      const opt=acct.options[i]; if(!opt)return;
      const pct=tot>0?Math.round(opt.count/tot*100):0;
      const pctEl=item.querySelector('.pie-pct'); if(pctEl)pctEl.textContent=opt.count+' · '+pct+'%';
    });
  }
}

function drawPie(acct,pal) {
  const cv=document.getElementById('pie-cv'); if(!cv)return;
  const ctx=cv.getContext('2d');
  const tot=acct.options.reduce((s,o)=>s+o.count,0);
  ctx.clearRect(0,0,180,180);
  if (!tot) {
    ctx.fillStyle=isDark()?'#2e3818':'#dde3ca';
    ctx.beginPath();ctx.arc(90,90,80,0,Math.PI*2);ctx.fill();
  } else {
    let ang=-Math.PI/2;
    acct.options.forEach((opt,i)=>{
      const slice=(opt.count/tot)*Math.PI*2;
      const [,,dot]=pal[i]||pal[0];
      ctx.beginPath();ctx.moveTo(90,90);ctx.arc(90,90,80,ang,ang+slice);ctx.closePath();
      ctx.fillStyle=dot;ctx.fill();
      ctx.strokeStyle=isDark()?'#0e1008':'#f9faf3';ctx.lineWidth=2;ctx.stroke();
      ang+=slice;
    });
  }
  ctx.beginPath();ctx.arc(90,90,36,0,Math.PI*2);
  ctx.fillStyle=isDark()?'#131508':'#f9faf3';ctx.fill();
  ctx.fillStyle=isDark()?'#eef2d8':'#1a1e10';
  ctx.font='bold 20px DM Mono,monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(tot,90,90);
}

// ── NEW ACCOUNT MODAL ──
function openNewModal() {
  newOptRows=['']; renderNewOpts();
  document.getElementById('new-name').value='';
  document.getElementById('new-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('new-name').focus(),120);
}
function closeNewModal() { document.getElementById('new-overlay').classList.remove('open'); }
function renderNewOpts() {
  const c=document.getElementById('new-opts'); c.innerHTML='';
  newOptRows.forEach((v,i)=>{
    const row=document.createElement('div'); row.className='opt-row';
    const inp=document.createElement('input'); inp.className='fi';
    inp.placeholder='Opción '+(i+1); inp.value=v;
    inp.addEventListener('input',()=>newOptRows[i]=inp.value);
    inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();addNewOptRow();}});
    const rm=document.createElement('button'); rm.className='btn-rm'; rm.textContent='✕';
    rm.addEventListener('click',()=>{newOptRows.splice(i,1);renderNewOpts();});
    row.appendChild(inp); row.appendChild(rm); c.appendChild(row);
  });
  const ins=c.querySelectorAll('input'); if(ins.length)ins[ins.length-1].focus();
}
function addNewOptRow() { newOptRows.push(''); renderNewOpts(); }
function createAccount() {
  const name=document.getElementById('new-name').value.trim();
  if (!name){document.getElementById('new-name').focus();return;}
  const opts=newOptRows.filter(o=>o.trim()).map(o=>({id:uid(),name:o.trim(),count:0}));
  if (!opts.length){toast('Añade al menos una opción');return;}
  const acct={id:uid(),name,options:opts};
  state.accounts.push(acct); state.activeId=acct.id; editMode=false;
  save(); closeNewModal(); renderSidebar(); renderView();
}

// ── THEME ──
function setTheme(dk) {
  state.darkMode=dk;
  document.documentElement.setAttribute('data-theme',dk?'dark':'light');
  document.getElementById('theme-btn').textContent=dk?'☀️':'🌙';
  const acct=state.accounts.find(a=>a.id===state.activeId);
  if(acct && document.getElementById('cgrid')){
    const pal=getPalette(acct.options.length,dk);
    buildCards(acct,pal);
    updateStats(acct);
  }
}

// ── INIT ──
load(); loadHash(); setTheme(state.darkMode);
document.getElementById('theme-btn').addEventListener('click',()=>{setTheme(!state.darkMode);save();});
const menuBtn=document.getElementById('menu-btn'),sb=document.getElementById('sidebar');
function chkMobile(){menuBtn.style.display=window.innerWidth<=600?'flex':'none';}
chkMobile(); menuBtn.addEventListener('click',()=>sb.classList.toggle('open')); window.addEventListener('resize',chkMobile);
document.getElementById('btn-new-acct').addEventListener('click',openNewModal);
document.getElementById('btn-empty-create').addEventListener('click',openNewModal);
document.getElementById('new-cancel').addEventListener('click',closeNewModal);
document.getElementById('new-create').addEventListener('click',createAccount);
document.getElementById('new-addrow').addEventListener('click',addNewOptRow);
document.getElementById('new-name').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();addNewOptRow();}});
document.getElementById('new-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('new-overlay'))closeNewModal();});
renderSidebar(); renderView();
</script>
</body>
